name: Wake Streamlit App

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install keep-alive dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/keep_alive/requirements.txt

      # No explicit Chrome/ChromeDriver install: the ubuntu-latest runner ships
      # Google Chrome, and Selenium Manager (bundled with Selenium >= 4.6) reads
      # the installed browser version and fetches the exactly-matching driver.
      # This avoids the recurring "ChromeDriver only supports Chrome version N"
      # mismatch that happened when a third-party action pinned the two
      # independently and they drifted apart.
      - name: Wake Streamlit app
        env:
          STREAMLIT_APP_URL: https://derivx.streamlit.app/
        run: python tools/keep_alive/main.py
